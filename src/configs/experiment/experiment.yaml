# @package _global_

defaults:
  - override /data: everyquery
  - override /logger: wandb
  - override /model: everyquery
  - override /trainer: ddp

tags:
  - "mgb"
  - "triplet"
  - "supervised"
  - "LVEF"

seed: 140799

trainer:
  min_epochs: 35
  max_epochs: 70
  gradient_clip_val: 1.0
  log_every_n_steps: 10
  devices: 
    - 0

callbacks:
  early_stopping:
    monitor: "val/occurs_auc"
    patience: 3
    mode: "max"

logger:
  wandb:
    tags: ${tags}
    group: "test"
    project: "EveryQuery"