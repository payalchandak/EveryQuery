# @package _global_

defaults:
  - override /data: everyquery_dataset
  - override /logger: wandb
  - override /model: everyquery
  - override /trainer: ddp

tags:
  - "mimiciv"
  - "triplet"
  - "supervised"

seed: 140799

trainer:
  min_steps: 2000
  max_steps: 10000
  gradient_clip_val: 1.0
  log_every_n_steps: 10
  devices: 
    - 0

callbacks:
  early_stopping:
    monitor: "val/occurs_auc"
    patience: 10
    mode: "max"

logger:
  wandb:
    tags: ${tags}
    group: "test"
    project: "EveryQuery"