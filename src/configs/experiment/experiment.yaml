# @package _global_

defaults:
  - override /data: everyquery
  - override /logger: wandb
  - override /model: everyquery
  - override /trainer: gpu

tags:
  - "mgb"
  - "triplet"
  - "supervised"

seed: 140799

trainer:
  min_epochs: 50
  max_epochs: 70
  gradient_clip_val: 1.0
  log_every_n_steps: 10
  devices: 
    - 1

model:
  projector: 
    mode: supervised_context
    dropout: 0
  token_dim: 512
  optimizer:
    lr: 0.0001
  backbone:
    n_layers: 2
    nheads: 4
    dropout: 0

logger:
  wandb:
    tags: ${tags}
    group: "test"
    project: "EveryQuery"