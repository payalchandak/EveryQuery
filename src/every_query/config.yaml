output_dir: ${oc.env:OUTPUT_DIR}/${hydra:run.dir}/
do_overwrite: false
do_resume: false
seed: 140799

query:
  task_dir: ${oc.env:TASK_DIR}
  sample_times_per_subject: 20 # epochs worth of data
  codes:
    - LAB//50976//g/dL//value_[7.2,7.4)
    - LAB//51276//U/g/Hb
    - LAB//223972//UNK
    - DIAGNOSIS//ICD//10//E871
    - DIAGNOSIS//ICD//9//7843
    - INFUSION_END//223258//value_[6.998357,9.703441)
    - LAB//224733//UNK
    - LAB//226534//mEq/L//value_[136.0,138.0)
    - LAB//51383//#/uL
    - LAB//227751//UNK
    - SUBJECT_FLUID_OUTPUT//226631//mL//value_[2875.0,inf)
    - LAB//51478//mg/dL//value_[70.0,100.0)
    - LAB//223940//UNK
    - DIAGNOSIS//ICD//10//K5900
    - LAB//224696//cmH2O//value_[23.0,25.0)
    - MEDICATION//START//Acetaminophen (Liquid)
    - LAB//51008//ug/mL//value_[69.0,77.0)
    - LAB//51662//UNK//value_[0.254,0.266)
    - MEDICATION//START//Cyclobenzaprine
    - LAB//50874//N/A

datamodule:
  _target_: meds_torchdata.extensions.lightning_datamodule.Datamodule
  data_class: dataset.EveryQueryPytorchDataset
  config:
    _target_: meds_torchdata.MEDSTorchDataConfig
    tensorized_cohort_dir: ${oc.env:FINAL_DATA_DIR}
    task_labels_dir: ???
    static_inclusion_mode: omit
    seq_sampling_strategy: to_end
    max_seq_len: 256
  batch_size: 160
  num_workers: 1
  pin_memory: True

lightning_module:
  _target_: every_query.lightning_module.EveryQueryLightningModule
  model:
    _target_: every_query.model.EveryQueryModel
    precision: "16-mixed"
    do_demo: false
    do_grad_ckpt: false
  optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 5.0e-4 # starting point (common LR for transformers)
    weight_decay: 0.01 # recommended for regularization
    eps: 1.0e-8 # default epsilon
    betas: [0.9, 0.999] # default betas (standard)
    amsgrad: false # default amsgrad (standard)
    fused: false # default fused (standard)
  LR_scheduler:
    _target_: transformers.get_cosine_schedule_with_warmup
    _partial_: true
    num_warmup_steps: ${int_prod:0.1,${.num_training_steps}} # ~10% of training steps
    num_training_steps: ${trainer.max_steps}
    num_cycles: 0.5

trainer:
  _target_: lightning.pytorch.trainer.Trainer
  logger:
    _target_: pytorch_lightning.loggers.wandb.WandbLogger
    name: "queries=${list_len:query.codes}_${now:%Y%m%d_%H%M%S}"
    save_dir: "${trainer.default_root_dir}/loggers"
    offline: False
    id: null # pass correct id to resume experiment!
    anonymous: null # enable anonymous logging
    project: EveryQuery
    log_model: False # upload lightning ckpts
    prefix: "" # a string to put at the beginning of metric keys
    entity: "gregkondas9-columbia-university"
    config:
      query_codes: ${query.codes}
      num_query_codes: ${list_len:query.codes}
  callbacks:
    _target_: __main__.values_as_list
    learning_rate_monitor:
      _target_: lightning.pytorch.callbacks.LearningRateMonitor
    model_checkpoint:
      _target_: lightning.pytorch.callbacks.ModelCheckpoint
      dirpath: ${trainer.default_root_dir}/checkpoints
      monitor: "tuning/loss"
      verbose: False
      save_last: True # additionally always save an exact copy of the last checkpoint to a file last.ckpt
      save_top_k: 5 # save k best models (determined by above metric)
      mode: "min"
      save_weights_only: False
      every_n_train_steps: 1000
  default_root_dir: ${output_dir}
  min_epochs: 1 # prevents early stopping
  max_epochs: null # We don't control the max epochs, we control the max steps.
  max_steps: 1000000
  accelerator: "auto"
  devices: "auto"
  accumulate_grad_batches: 1 # set to 1 for no gradient accumulation, >1 for gradient accumulation
  log_every_n_steps: 50
  # perform a validation loop every N training epochs
  check_val_every_n_epoch: 1
  val_check_interval: 0.05 # validate 10 times per epoch
  limit_val_batches: 100 # use only up to N validation batches to speed up training
  # set True to to ensure deterministic results
  # makes training slower but gives more reproducibility than just setting seeds
  deterministic: False
  gradient_clip_val: 1.0
